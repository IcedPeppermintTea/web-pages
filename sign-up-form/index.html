<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <section class="img-banner">
        <div class="title">
            <img src="/assets/svgs/travel_explore.svg" alt="travel icon">
            <h1>Litora</h1>
        </div>

        <div class="credits">
            <p>
                Photo by <a href="https://unsplash.com/@mitchorr">Mitchell Orr</a>
            </p>
        </div>
    </section>

    <section class="signup">
        <div class="paragraph padding">
            <p>Lorem ipsum dolor sit amet consectetur adipiscing elit. Quisque faucibus
                ex sapien vitae pellentesque sem placerat. In id cursus mi pretium
                tellus <em>duis</em> convallis.</p>
            <br>
            <p>Tempus leo eu aenean.</p>
        </div>
        <div class="form-section padding">
            <h2>Let's do this!</h2>
            <form action="example.com/path" method="post" id="signup">
                <div class="form-row">
                    <div class="form-item">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="John" required>
                    </div>


                    <div class="form-item">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Smith" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-item">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="example@yahoo.com" required>
                    </div>

                    <div class="form-item">
                        <label for="phone_number">Phone Number</label>
                        <input type="tel" id="phone_number" name="phone_number" placeholder="###-###-####"
                            pattern="^\d{3}-\d{3}-\d{4}$" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-item">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter Password" required>
                    </div>

                    <div class="form-item">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" placeholder="Confirm Password" required>
                    </div>
                </div>
            </form>
        </div>
        <div class="buttons padding">
            <button type="submit" form="signup">Create Account</button>
            <p>Already have an account? <a href="login/">Log In</a></p>
        </div>
    </section>
</body>

</html>
